<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極密碼 - 猜數字遊戲</title>
    <style>
        /* 響應式設計與美化 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #1a73e8; }
        .range-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d93025;
            margin: 20px 0;
        }
        input[type="number"] {
            width: 80%;
            padding: 10px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-submit { background-color: #1a73e8; color: white; }
        .btn-submit:hover { background-color: #1557b0; }
        .btn-reset { background-color: #606770; color: white; margin-top: 10px; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>終極密碼</h1>
    <div class="range-display" id="range">1 ~ 100</div>
    
    <input type="number" id="guessInput" placeholder="輸入數字..." min="1" max="100">
    <br>
    <button class="btn-submit" onclick="checkGuess()">送出</button>
    <br>
    <button class="btn-reset" onclick="initGame()">重新開始</button>
    
    <p id="message">請輸入 1 到 100 之間的數字</p>
</div>

<script>
    let target, min, max;

    // 初始化遊戲
    function initGame() {
        target = Math.floor(Math.random() * 100) + 1;
        min = 1;
        max = 100;
        updateUI("請開始遊戲！");
        document.getElementById('guessInput').value = '';
    }

    // 更新畫面
    function updateUI(msg) {
        document.getElementById('range').innerText = `${min} ~ ${max}`;
        document.getElementById('message').innerText = msg;
    }

    // 檢查數字邏輯
    function checkGuess() {
        const input = document.getElementById('guessInput');
        const guess = parseInt(input.value);

        if (isNaN(guess) || guess < min || guess > max) {
            updateUI(`請輸入有效範圍內的數字 (${min}~${max})`);
            return;
        }

        if (guess === target) {
            updateUI(`🎯 恭喜！答案就是 ${target}！`);
            document.getElementById('range').innerText = "Bingo!";
        } else if (guess < target) {
            min = guess;
            updateUI("太小了，再試一次！");
        } else {
            max = guess;
            updateUI("太大了，再試一次！");
        }
        input.value = ''; // 清空輸入框
        input.focus();    // 自動聚焦回輸入框
    }

    // 啟動遊戲
    initGame();
</script>

</body>
</html>
